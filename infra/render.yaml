services:
  - type: web
    name: oto-dial-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false  # Set this in Render dashboard
        # Example value: https://your-frontend.vercel.app
      - key: PORT
        value: 5000
      - key: GA4_MEASUREMENT_ID
        value: G-X3WN8RYCQ5
      - key: GA4_PROPERTY_ID
        value: "523626440"
      - key: GA4_ENABLED
        value: true
      - key: GA4_MP_API_SECRET
        sync: false
      - key: GOOGLE_ANALYTICS_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_ANALYTICS_SERVICE_ACCOUNT_BASE64
        sync: false
    healthCheckPath: /

