# OTODIAL — production Nginx site (Ubuntu + Certbot)
#
# 1) Copy map file (once per machine):
#    sudo cp deploy/nginx-map-connection-upgrade.conf /etc/nginx/conf.d/00-map-connection-upgrade.conf
# 2) Install this file:
#    sudo cp deploy/otodial-nginx-site.conf /etc/nginx/sites-available/otodial
#    sudo ln -sf /etc/nginx/sites-available/otodial /etc/nginx/sites-enabled/otodial
# 3) sudo nginx -t && sudo systemctl reload nginx
#
# upstream: Node (PM2) on 127.0.0.1:5000 — keep in sync with ecosystem.config.js PORT

upstream oto_dial_node {
    server 127.0.0.1:5000;
    keepalive 32;
}

# HTTP — ACME + redirect (adjust webroot if certbot uses a different path)
server {
    listen 80;
    listen [::]:80;
    server_name otodial.com www.otodial.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/oto-dial/frontend/dist;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name otodial.com www.otodial.com;

    ssl_certificate     /etc/letsencrypt/live/otodial.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/otodial.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/oto-dial/frontend/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml application/xml application/javascript application/json application/xml+rss image/svg+xml;

    client_max_body_size 25M;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Hashed Vite assets — long cache (never cache HTML here; separate block below)
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Service worker — must not be cached long (stale SW + new chunks = broken loads)
    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ~* \.html$ {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Socket.IO (admin live UI) — must not fall through to SPA index.html
    location /socket.io {
        proxy_pass http://oto_dial_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # Prefix /api (not only /api/) so /api and /api/... both proxy
    location /api {
        proxy_pass http://oto_dial_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://oto_dial_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /robots.txt {
        proxy_pass http://oto_dial_node/api/site/robots.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location = /sitemap.xml {
        proxy_pass http://oto_dial_node/api/site/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/otodial-access.log;
    error_log  /var/log/nginx/otodial-error.log warn;
}
