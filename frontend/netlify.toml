[build]
  # Build command
  command = "npm run build"
  
  # Output directory (where Vite puts the built files)
  publish = "dist"

  # Environment variables for build
  [build.environment]
    NODE_VERSION = "18"
    
  # IMPORTANT: Set these in Netlify Dashboard → Site Settings → Environment Variables
  # VITE_SUPABASE_URL = "your-supabase-url"
  # VITE_SUPABASE_ANON_KEY = "your-supabase-anon-key"
  # VITE_API_URL = "your-backend-api-url" (optional)
  #
  # See NETLIFY_SETUP.md for detailed setup instructions

# SPA redirect rules (backup to _redirects file)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

