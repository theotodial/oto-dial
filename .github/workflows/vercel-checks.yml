name: Vercel Deployment Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    continue-on-error: true
    
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run lint (if available)
        id: lint
        continue-on-error: true
        run: npm run lint || echo "No lint script found, skipping..."
      
      - name: Notify Vercel - Lint
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "vercel - oto-dial: lint"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build check
        id: build
        run: npm run build
      
      - name: Notify Vercel - Build Check
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - oto-dial: build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

