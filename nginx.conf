# =============================================================================
# OTODIAL — Nginx on Ubuntu
# =============================================================================
# The maintained production templates live under deploy/ (do not duplicate):
#
#   deploy/otodial-nginx-site.conf          → /etc/nginx/sites-available/otodial
#   deploy/verify-remote-frontend.sh          → curl live HTML for legacy boot strings
#   deploy/deploy-frontend-release.sh         → symlink dist_releases/release_* (preferred)
#   deploy/rollback-frontend.sh               → roll back release symlink
#   deploy/deploy-frontend-atomic.sh          → legacy mv-based swap (deprecated)
#   deploy/nginx-map-connection-upgrade.conf → /etc/nginx/conf.d/00-map-connection-upgrade.conf
#
# Networking guide (ERR_CONNECTION_TIMED_OUT vs local curl):
#   deploy/PRODUCTION_NETWORKING.md
#
# Quick install on VPS:
#   sudo cp deploy/nginx-map-connection-upgrade.conf /etc/nginx/conf.d/00-map-connection-upgrade.conf
#   sudo cp deploy/otodial-nginx-site.conf /etc/nginx/sites-available/otodial
#   sudo ln -sf /etc/nginx/sites-available/otodial /etc/nginx/sites-enabled/otodial
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================
